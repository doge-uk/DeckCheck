name: Build Multi-Platform & Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      
      - name: Build Rust backend
        run: cargo build --release
      
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install  # Changed from npm ci to npm install
      
      - name: Build Electron app
        working-directory: frontend
        run: npm run dist
      
      - uses: actions/upload-artifact@v4
        with:
          name: deckcheck-windows
          path: frontend/dist/
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      
      - name: Build Rust backend
        run: cargo build --release
      
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install  # Changed from npm ci to npm install
      
      - name: Build Electron app
        working-directory: frontend
        run: npm run dist
      
      - uses: actions/upload-artifact@v4
        with:
          name: deckcheck-macos
          path: frontend/dist/
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      
      - name: Build Rust backend
        run: cargo build --release
      
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install  # Changed from npm ci to npm install
      
      - name: Build Electron app
        working-directory: frontend
        run: npm run dist
      
      - uses: actions/upload-artifact@v4
        with:
          name: deckcheck-linux
          path: frontend/dist/
          retention-days: 30

  create-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/deckcheck-windows/**/*.exe
            artifacts/deckcheck-windows/**/*.exe.blockmap
            artifacts/deckcheck-windows/**/latest.yml
            artifacts/deckcheck-macos/**/*.dmg
            artifacts/deckcheck-macos/**/*.zip
            artifacts/deckcheck-linux/**/*.AppImage
            artifacts/deckcheck-linux/**/*.deb
            artifacts/deckcheck-linux/**/*.rpm
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}